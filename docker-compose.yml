services:
  postgres:
    image: postgres:16-alpine
    container_name: quarkus-jpa-sample-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: npb
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
    ports:
      - "55901:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarkus -d npb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
